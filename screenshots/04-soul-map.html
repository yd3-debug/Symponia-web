<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1290px;
  height: 2796px;
  background: #0E0B1A;
  overflow: hidden;
  position: relative;
  -webkit-font-smoothing: antialiased;
}

.bg {
  position: absolute;
  inset: 0;
  z-index: 0;
}

.content {
  position: relative;
  z-index: 1;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── Status bar ───────────────────────────────────────────────────────────── */
.status-bar {
  width: 100%;
  height: 100px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding: 0 72px 18px;
}
.status-time {
  font-family: -apple-system, sans-serif;
  font-size: 34px;
  font-weight: 600;
  color: rgba(235, 228, 255, 0.85);
  letter-spacing: -0.5px;
}
.status-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

/* ── Header ───────────────────────────────────────────────────────────────── */
.header-section {
  margin-top: 70px;
  padding: 0 80px;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 18px;
}
.label-tag {
  font-family: -apple-system, sans-serif;
  font-size: 24px;
  font-weight: 500;
  letter-spacing: 0.20em;
  color: #9B7FE8;
  text-transform: uppercase;
}
.page-headline {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 132px;
  font-weight: 300;
  line-height: 1.0;
  color: rgba(235, 228, 255, 0.95);
}
.page-headline-italic {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 132px;
  font-weight: 300;
  font-style: italic;
  line-height: 1.0;
  color: #C084FC;
  filter: drop-shadow(0 0 28px rgba(192, 132, 252, 0.35));
}
.page-body {
  font-family: -apple-system, sans-serif;
  font-size: 30px;
  font-weight: 300;
  color: rgba(235, 228, 255, 0.40);
  margin-top: 8px;
  letter-spacing: 0.02em;
  line-height: 1.5;
}

/* ── Position list ────────────────────────────────────────────────────────── */
.position-list {
  margin-top: 56px;
  padding: 0 64px;
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.position-row {
  display: flex;
  align-items: center;
  gap: 0;
  background: rgba(120, 90, 220, 0.06);
  border: 1px solid rgba(140, 110, 230, 0.14);
  border-radius: 22px;
  overflow: hidden;
  padding: 30px 44px;
}

.position-row.dominant {
  background: rgba(155, 127, 232, 0.14);
  border-color: rgba(155, 127, 232, 0.45);
  box-shadow: 0 0 30px rgba(155, 127, 232, 0.15), inset 0 0 20px rgba(155, 127, 232, 0.04);
}

.position-row.shadow-row {
  background: rgba(192, 132, 252, 0.09);
  border-color: rgba(192, 132, 252, 0.32);
  box-shadow: 0 0 24px rgba(192, 132, 252, 0.12);
}

.pos-number {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 40px;
  font-weight: 300;
  color: rgba(235, 228, 255, 0.25);
  width: 52px;
  flex-shrink: 0;
}
.position-row.dominant .pos-number {
  color: #9B7FE8;
}
.position-row.shadow-row .pos-number {
  color: #C084FC;
}

.pos-emoji {
  font-size: 56px;
  line-height: 1;
  margin-left: 20px;
  flex-shrink: 0;
}

.pos-animal {
  font-family: -apple-system, sans-serif;
  font-size: 34px;
  font-weight: 400;
  color: rgba(235, 228, 255, 0.80);
  margin-left: 28px;
  flex: 1;
}
.position-row.dominant .pos-animal {
  color: rgba(235, 228, 255, 0.95);
  font-weight: 500;
}
.position-row.shadow-row .pos-animal {
  color: rgba(192, 132, 252, 0.90);
  font-weight: 400;
}

.pos-label {
  font-family: -apple-system, sans-serif;
  font-size: 20px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(235, 228, 255, 0.28);
  text-align: right;
}
.position-row.dominant .pos-label {
  color: #9B7FE8;
}
.position-row.shadow-row .pos-label {
  color: rgba(192, 132, 252, 0.60);
}

/* Connector line between items */
.connector {
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding-left: 130px;
}
.connector-line {
  width: 2px;
  height: 100%;
  background: linear-gradient(to bottom, rgba(155, 127, 232, 0.20), rgba(155, 127, 232, 0.10));
}

/* ── Begin button ─────────────────────────────────────────────────────────── */
.spacer { flex: 1; }

.begin-section {
  margin-bottom: 44px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 28px;
  width: 100%;
  padding: 0 80px;
}

.begin-btn {
  width: 100%;
  height: 120px;
  border-radius: 28px;
  background: linear-gradient(135deg, rgba(155, 127, 232, 0.22) 0%, rgba(192, 132, 252, 0.18) 100%);
  border: 1px solid rgba(155, 127, 232, 0.45);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 24px;
  box-shadow: 0 0 40px rgba(155, 127, 232, 0.18);
}
.begin-btn-text {
  font-family: -apple-system, sans-serif;
  font-size: 36px;
  font-weight: 500;
  letter-spacing: 0.08em;
  color: rgba(235, 228, 255, 0.90);
  text-transform: uppercase;
}
.begin-btn-glyph {
  font-size: 36px;
  color: #9B7FE8;
}

/* ── Home indicator ───────────────────────────────────────────────────────── */
.home-indicator {
  width: 190px;
  height: 6px;
  background: rgba(235, 228, 255, 0.22);
  border-radius: 3px;
  margin-bottom: 28px;
}
</style>
</head>
<body>

<svg class="bg" xmlns="http://www.w3.org/2000/svg" width="1290" height="2796">
  <defs>
    <radialGradient id="b1" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#3D1E8A" stop-opacity="0.55"/>
      <stop offset="70%"  stop-color="#3D1E8A" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#3D1E8A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="b2" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#2A1A7A" stop-opacity="0.50"/>
      <stop offset="70%"  stop-color="#2A1A7A" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#2A1A7A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="b3" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#6A1E9A" stop-opacity="0.48"/>
      <stop offset="70%"  stop-color="#6A1E9A" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#6A1E9A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <ellipse cx="200"  cy="600"  rx="750" ry="620" fill="url(#b1)"/>
  <ellipse cx="1100" cy="1000" rx="650" ry="700" fill="url(#b2)"/>
  <ellipse cx="500"  cy="2400" rx="800" ry="600" fill="url(#b3)"/>
</svg>

<div class="content">

  <!-- Status bar -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-right">
      <svg width="22" height="18" viewBox="0 0 22 18" fill="none">
        <rect x="0"  y="10" width="4" height="8"  rx="1" fill="rgba(235,228,255,0.75)"/>
        <rect x="6"  y="7"  width="4" height="11" rx="1" fill="rgba(235,228,255,0.75)"/>
        <rect x="12" y="4"  width="4" height="14" rx="1" fill="rgba(235,228,255,0.75)"/>
        <rect x="18" y="0"  width="4" height="18" rx="1" fill="rgba(235,228,255,0.75)"/>
      </svg>
      <svg width="24" height="20" viewBox="0 0 24 20" fill="none">
        <circle cx="12" cy="17" r="2" fill="rgba(235,228,255,0.75)"/>
        <path d="M5.5 11.5A9 9 0 0 1 18.5 11.5" stroke="rgba(235,228,255,0.75)" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M2 8A13 13 0 0 1 22 8" stroke="rgba(235,228,255,0.75)" stroke-width="2" fill="none" stroke-linecap="round"/>
      </svg>
      <svg width="32" height="16" viewBox="0 0 32 16">
        <rect x="0.75" y="0.75" width="27.5" height="14.5" rx="4" stroke="rgba(235,228,255,0.55)" stroke-width="1.5" fill="none"/>
        <rect x="2.5"  y="2.5"  width="22"   height="11"   rx="2.5" fill="rgba(235,228,255,0.80)"/>
        <path d="M29.5 5.5v5" stroke="rgba(235,228,255,0.55)" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
  </div>

  <!-- Header -->
  <div class="header-section">
    <div class="label-tag">◈ Your reading</div>
    <div class="page-headline">Seven voices.</div>
    <div class="page-headline-italic">One truth.</div>
    <div class="page-body">Each position speaks a different part of you.</div>
  </div>

  <!-- Position list -->
  <div class="position-list">

    <div class="position-row dominant">
      <div class="pos-number">1</div>
      <div class="pos-emoji">🐺</div>
      <div class="pos-animal">Wolf</div>
      <div class="pos-label">Dominant Self</div>
    </div>

    <div class="connector"><div class="connector-line"></div></div>

    <div class="position-row">
      <div class="pos-number">2</div>
      <div class="pos-emoji">🦅</div>
      <div class="pos-animal">Eagle</div>
      <div class="pos-label">Second Force</div>
    </div>

    <div class="connector"><div class="connector-line"></div></div>

    <div class="position-row">
      <div class="pos-number">3</div>
      <div class="pos-emoji">🦢</div>
      <div class="pos-animal">Swan</div>
      <div class="pos-label">Third Force</div>
    </div>

    <div class="connector"><div class="connector-line"></div></div>

    <div class="position-row">
      <div class="pos-number">4</div>
      <div class="pos-emoji">🐍</div>
      <div class="pos-animal">Snake</div>
      <div class="pos-label">Bridge</div>
    </div>

    <div class="connector"><div class="connector-line"></div></div>

    <div class="position-row">
      <div class="pos-number">5</div>
      <div class="pos-emoji">🦉</div>
      <div class="pos-animal">Owl</div>
      <div class="pos-label">Bridge</div>
    </div>

    <div class="connector"><div class="connector-line"></div></div>

    <div class="position-row">
      <div class="pos-number">6</div>
      <div class="pos-emoji">🦊</div>
      <div class="pos-animal">Fox</div>
      <div class="pos-label">Threshold</div>
    </div>

    <div class="connector"><div class="connector-line"></div></div>

    <div class="position-row shadow-row">
      <div class="pos-number">7</div>
      <div class="pos-emoji">🕷️</div>
      <div class="pos-animal">Spider</div>
      <div class="pos-label">The Shadow</div>
    </div>

  </div>

  <div class="spacer"></div>

  <!-- Begin button -->
  <div class="begin-section">
    <div class="begin-btn">
      <span class="begin-btn-glyph">◈</span>
      <span class="begin-btn-text">Begin your reading</span>
    </div>
  </div>

  <!-- Home indicator -->
  <div class="home-indicator"></div>

</div>
</body>
</html>
